<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title>Cartograph system architecture</title>
<desc>Cartograph as ADK root agent orchestrating Mapper, Auditor, Generator sub-agents. Uses MCP in two roles: client to read corpus and eval suites, provider to expose coverage state.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size:14px; fill:#3d3d3a; }
.ts { font-size:12px; fill:#73726c; }
.th { font-size:14px; font-weight:500; fill:#3d3d3a; }
.arr { stroke:#888780; stroke-width:1.5; fill:none; }
.leader { stroke:#888780; stroke-width:0.5; stroke-dasharray:2,2; fill:none; }
</style>
</defs>

<text class="ts" x="40" y="30" fill="#73726c">Inputs (per audited agent)</text>
<rect x="40" y="40" width="290" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="185" y="60" text-anchor="middle" dominant-baseline="central" fill="#444441">Real-world corpus</text>
<text class="ts" x="185" y="76" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Bitext, GitHub issues, StackExchange</text>

<rect x="350" y="40" width="290" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="495" y="60" text-anchor="middle" dominant-baseline="central" fill="#444441">Target agent + eval suite</text>
<text class="ts" x="495" y="76" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">e.g. adk-samples customer-service</text>

<rect x="40" y="120" width="600" height="220" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="60" y="148" fill="#3C3489">Cartograph (ADK root agent)</text>
<text class="ts" x="60" y="166" fill="#534AB7">LLM-driven orchestrator — decides next action from coverage state</text>

<rect x="70" y="220" width="170" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="155" y="252" text-anchor="middle" dominant-baseline="central" fill="#085041">Mapper</text>
<text class="ts" x="155" y="276" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Embeds and clusters</text>
<text class="ts" x="155" y="294" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">the corpus</text>

<rect x="255" y="220" width="170" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="252" text-anchor="middle" dominant-baseline="central" fill="#085041">Auditor</text>
<text class="ts" x="340" y="276" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Scores coverage,</text>
<text class="ts" x="340" y="294" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">ranks gaps by risk</text>

<rect x="440" y="220" width="170" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="525" y="252" text-anchor="middle" dominant-baseline="central" fill="#085041">Generator</text>
<text class="ts" x="525" y="276" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Synthesizes tests</text>
<text class="ts" x="525" y="294" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">for uncovered regions</text>

<line x1="185" y1="90" x2="155" y2="218" class="arr" marker-end="url(#arrow)"/>
<line x1="495" y1="90" x2="340" y2="218" class="arr" marker-end="url(#arrow)"/>

<line x1="155" y1="320" x2="155" y2="398" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="320" x2="340" y2="398" class="arr" marker-end="url(#arrow)"/>
<line x1="525" y1="320" x2="525" y2="398" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="40" y="380" fill="#73726c">MCP client (Cartograph reads)</text>
<text class="ts" x="640" y="380" text-anchor="end" fill="#73726c">MCP provider (Cartograph exposes)</text>

<rect x="40" y="400" width="200" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="140" y="422" text-anchor="middle" dominant-baseline="central" fill="#633806">corpus_reader</text>

<rect x="255" y="400" width="170" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="422" text-anchor="middle" dominant-baseline="central" fill="#633806">eval_io</text>

<rect x="440" y="400" width="200" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="540" y="422" text-anchor="middle" dominant-baseline="central" fill="#712B13">coverage_state</text>

<line x1="140" y1="444" x2="140" y2="498" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="444" x2="340" y2="498" class="arr" marker-end="url(#arrow)"/>
<line x1="540" y1="444" x2="540" y2="498" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="40" y="490" fill="#73726c">External resources</text>
<text class="ts" x="640" y="490" text-anchor="end" fill="#73726c">External consumers</text>

<rect x="40" y="500" width="200" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="140" y="522" text-anchor="middle" dominant-baseline="central" fill="#444441">Corpus stores</text>
<text class="ts" x="140" y="540" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Bitext, GitHub,</text>
<text class="ts" x="140" y="554" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">StackExchange</text>

<rect x="255" y="500" width="170" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="522" text-anchor="middle" dominant-baseline="central" fill="#444441">Eval repos</text>
<text class="ts" x="340" y="540" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">adk-samples,</text>
<text class="ts" x="340" y="554" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">customer Git</text>

<rect x="440" y="500" width="200" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="540" y="522" text-anchor="middle" dominant-baseline="central" fill="#444441">CI, dashboards,</text>
<text class="th" x="540" y="540" text-anchor="middle" dominant-baseline="central" fill="#444441">future L2/L3 layers</text>
<text class="ts" x="540" y="556" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">read coverage as signal</text>
</svg>
