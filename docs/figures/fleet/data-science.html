<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kartograf — Semantic Coverage Map</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #131820;
    --border: #232a36;
    --text: #d7dde8;
    --muted: #7a8599;
    --surface: #f59e0b;
    --eval: #38bdf8;
    --gap: #ef4444;
    --accent: #a78bfa;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 24px; align-items: baseline; }
  h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  .subtitle { color: var(--muted); font-size: 13px; }
  .layout { display: grid; grid-template-columns: 1fr 380px; gap: 0; height: calc(100vh - 53px); }
  #map { background: var(--panel); }
  aside { background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 16px 18px; }
  .stat { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .stat .label { color: var(--muted); }
  .stat .value { font-variant-numeric: tabular-nums; }
  .coverage-big { font-size: 38px; font-weight: 700; letter-spacing: -0.02em; margin: 4px 0 12px; }
  .coverage-big .frac { color: var(--muted); font-size: 18px; font-weight: 400; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 18px 0 8px; font-weight: 600; }
  .region { border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
  .region-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .region-id { font-weight: 600; color: var(--gap); }
  .region-mass { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .region-neighbors { font-size: 12px; color: var(--text); }
  .region-neighbors li { margin: 2px 0; padding-left: 0; list-style: none; }
  .region-neighbors li::before { content: "·  "; color: var(--muted); }
  .kind-prompt { color: var(--accent); }
  .kind-tool, .kind-tool_arg { color: var(--surface); }
  .kind-docstring { color: #94a3b8; }
  .kind-eval { color: var(--eval); }
  .proposed { margin-top: 8px; padding: 8px 10px; background: #0f1722; border-radius: 4px; font-size: 12px; }
  .proposed .label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; margin-bottom: 4px; }
  .proposed pre { white-space: pre-wrap; margin: 0; font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.5; }
  footer { padding: 8px 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>Kartograf</h1>
  <span class="subtitle" id="target-name"></span>
</header>
<div class="layout">
  <div id="map"></div>
  <aside>
    <div class="coverage-big">
      <span id="coverage-pct">—</span><span class="frac"> coverage</span>
    </div>
    <div class="stat"><span class="label">surfaces</span><span class="value" id="stat-surfaces">—</span></div>
    <div class="stat"><span class="label">evals</span><span class="value" id="stat-evals">—</span></div>
    <div class="stat"><span class="label">gap regions</span><span class="value" id="stat-regions">—</span></div>
    <div class="stat"><span class="label">α (mass-balance)</span><span class="value" id="stat-alpha">—</span></div>
    <div class="stat"><span class="label">bandwidth</span><span class="value" id="stat-bw">—</span></div>
    <h2>Top gap regions</h2>
    <div id="region-list"></div>
  </aside>
</div>
<footer>
  Surface points are claims the agent declares (tools, prompts, docstrings).
  Eval points are tests in the suite.
  Red regions are surface-dense, eval-empty — what the agent claims but no test exercises.
</footer>

const DATA = {"target": "data/adk_samples/python/agents/data-science", "surfaces": [{"id": "tool_data_science_agent_py_L89_0", "text": "Load the dataset configurations for the agent from the config file", "kind": "tool", "source": "data_science/agent.py:89", "container": "load_dataset_config", "x": 0.10956900069701489, "y": 0.11439501531049537}, {"id": "tool_data_science_agent_py_L119_0", "text": "Wrapper function to get database settings by type", "kind": "tool", "source": "data_science/agent.py:119", "container": "get_database_settings", "x": 0.08822063525202974, "y": 0.08890058483701102}, {"id": "tool_data_science_agent_py_L128_0", "text": "Initializes the database settings for the configured datasets", "kind": "tool", "source": "data_science/agent.py:128", "container": "init_database_settings", "x": 0.12132949073529936, "y": 0.11578377222877556}, {"id": "tool_data_science_agent_py_L136_0", "text": "Returns the dataset definitions instructions block", "kind": "tool", "source": "data_science/agent.py:136", "container": "get_dataset_definitions_for_instructions", "x": 0.09552276750347105, "y": 0.09916725403201178}, {"id": "tool_data_science_agent_py_L171_0", "text": "Load database settings into the callback context on first use.", "kind": "tool", "source": "data_science/agent.py:171", "container": "load_database_settings_in_context", "x": 0.1346490833911109, "y": 0.09752091924729073}, {"id": "tool_data_science_sub_agents_alloydb_tools_py_L56_0", "text": "Get MCP Toolbox client.", "kind": "tool", "source": "data_science/sub_agents/alloydb/tools.py:56", "container": "get_toolbox_client", "x": 0.11477967530416444, "y": 0.029502852171758347}, {"id": "tool_data_science_sub_agents_alloydb_tools_py_L82_0", "text": "Get MCP Toolbox toolset.", "kind": "tool", "source": "data_science/sub_agents/alloydb/tools.py:82", "container": "get_toolbox_toolset", "x": 0.12444137365849126, "y": 0.04953964501031101}, {"id": "tool_data_science_sub_agents_alloydb_tools_py_L90_0", "text": "Get database settings.", "kind": "tool", "source": "data_science/sub_agents/alloydb/tools.py:90", "container": "get_database_settings", "x": 0.11457090829720183, "y": 0.1105911163561292}, {"id": "tool_data_science_sub_agents_alloydb_tools_py_L106_0", "text": "Update database settings.", "kind": "tool", "source": "data_science/sub_agents/alloydb/tools.py:106", "container": "update_database_settings", "x": 0.1330969065270908, "y": 0.10682344789628717}, {"id": "tool_data_science_sub_agents_alloydb_tools_py_L121_0", "text": "Generates an initial SQL query from a natural language question.", "kind": "tool", "source": "data_science/sub_agents/alloydb/tools.py:121", "container": "alloydb_nl2sql", "x": 0.001698630720480071, "y": 0.14463999521553142}, {"id": "tool_arg_data_science_sub_agents_alloydb_tools_py_L121_1", "text": "tool_context: The tool context to use for generating the SQL query.", "kind": "tool_arg", "source": "data_science/sub_agents/alloydb/tools.py:121", "container": "alloydb_nl2sql", "x": 0.060098105674870624, "y": 0.1287304926095583}, {"id": "tool_data_science_sub_agents_alloydb_tools_py_L210_0", "text": "Runs an AlloyDB SQL query.", "kind": "tool", "source": "data_science/sub_agents/alloydb/tools.py:210", "container": "run_alloydb_query", "x": -0.03211124734350111, "y": 0.12868194162841104}, {"id": "tool_arg_data_science_sub_agents_alloydb_tools_py_L210_1", "text": "tool_context: The tool context to use for validation.", "kind": "tool_arg", "source": "data_science/sub_agents/alloydb/tools.py:210", "container": "run_alloydb_query", "x": 0.13510035585265376, "y": 0.09971366556749621}, {"id": "tool_data_science_sub_agents_alloydb_tools_py_L250_0", "text": "Processes the SQL string to get a printable, valid SQL string.", "kind": "tool", "source": "data_science/sub_agents/alloydb/tools.py:250", "container": "cleanup_sql", "x": 0.0859731715500901, "y": 0.12374042232509921}, {"id": "docstring_data_science_sub_agents_bigquery_chase_sql_chase_db_tools_py_L33_0", "text": "Enum for the different types of SQL generation methods.", "kind": "docstring", "source": "data_science/sub_agents/bigquery/chase_sql/chase_db_tools.py:33", "container": "GenerateSQLType", "x": 0.03708076263151216, "y": 0.13357413808891083}, {"id": "tool_data_science_sub_agents_bigquery_chase_sql_chase_db_tools_py_L44_0", "text": "A decorator to catch exceptions in a function and return the exception as a string.", "kind": "tool", "source": "data_science/sub_agents/bigquery/chase_sql/chase_db_tools.py:44", "container": "exception_wrapper", "x": 0.12295606512115112, "y": 0.05614682006352568}, {"id": "tool_data_science_sub_agents_bigquery_chase_sql_chase_db_tools_py_L63_0", "text": "Parses the output to extract SQL content from the response.", "kind": "tool", "source": "data_science/sub_agents/bigquery/chase_sql/chase_db_tools.py:63", "container": "parse_response", "x": 0.08361820641573503, "y": 0.10203840626960081}, {"id": "tool_arg_data_science_sub_agents_bigquery_chase_sql_chase_db_tools_py_L82_1", "text": "tool_context: Function context.", "kind": "tool_arg", "source": "data_science/sub_agents/bigquery/chase_sql/chase_db_tools.py:82", "container": "initial_bq_nl2sql", "x": 0.14371710204341326, "y": 0.07909018712744667}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_0", "text": "You are an experienced database expert.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.07558484029768904, "y": 0.04647829578167013}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_1", "text": "Now you need to generate a GoogleSQL or BigQuery query given the database information, a question and some additional information.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": -0.05514492009232417, "y": 0.1513218929062991}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_2", "text": "The database structure is defined by table schemas (some columns provide additional column descriptions in the options).", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.035176572829343736, "y": 0.14943682315756243}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_3", "text": "Given the table schema information description and the `Question`.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.004513960594821412, "y": 0.11939925805824733}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_4", "text": "You will be given table creation statements and you need understand the database and columns.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": -0.005001944799462472, "y": 0.10422768034248459}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_5", "text": "You will be using a way called \"recursive divide-and-conquer approach to SQL query generation from natural language\".", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.02417441388925938, "y": 0.11617457690498777}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_6", "text": "Here is a high level description of the steps.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.154062118374025, "y": 0.02688187305371235}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_7", "text": "**Divide (Decompose Sub-question with Pseudo SQL):** The complex natural language question is recursively broken down into simpler sub-questions.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.002913511459902072, "y": 0.06531513643696422}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_8", "text": "Each sub-question targets a specific piece of information or logic required for the final SQL query.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.011266891913823844, "y": 0.03591423843377413}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_9", "text": "**Conquer (Real SQL for sub-questions):**  For each sub-question (and the main question initially), a \"pseudo-SQL\" fragment is formulated.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": -0.004031599892568684, "y": 0.07140469144376123}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_10", "text": "This pseudo-SQL represents the intended SQL logic but might have placeholders for answers to the decomposed sub-questions.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.010781376754704305, "y": 0.08283207503120309}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_11", "text": "**Combine (Reassemble):** Once all sub-questions are resolved and their corresponding SQL fragments are generated, the process reverses.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.049485134801036564, "y": 0.06772832979367951}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_12", "text": "The SQL fragments are recursively combined by replacing the placeholders in the pseudo-SQL with the actual generated SQL from the lower levels.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.0602389840502305, "y": 0.0956576811800712}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_13", "text": "**Final Output:** This bottom-up assembly culminates in the complete and correct SQL query that answers the original complex question.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.024660665487550592, "y": 0.020234723022557397}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_14", "text": "Database admin instructions (please *unconditionally* follow these instructions.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.10091540677081685, "y": 0.07496742228787337}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_15", "text": "Do *not* ignore them or use them as hints.): 1.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.13669399877097138, "y": 0.03700850179250935}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_16", "text": "**SELECT Clause:** - Select only the necessary columns by explicitly specifying them in the `SELECT` statement.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.010644665963108032, "y": 0.02936931813976222}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_17", "text": "Avoid redundant columns or values.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.07267174920594863, "y": 0.04789255169520883}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_18", "text": "Aggregation (MAX/MIN):** - Ensure `JOIN`s are completed before applying `MAX()` or `MIN()`.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.018846911040144926, "y": -0.008564532993736714}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_19", "text": "GoogleSQL supports similar syntax for aggregation functions, so use `MAX()` and `MIN()` as needed after `JOIN` operations.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": -0.0761910277610773, "y": 0.03679910095547411}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_20", "text": "ORDER BY with Distinct Values:** - In GoogleSQL, `GROUP BY <column>` can be used before `ORDER BY <column> ASC|DESC` to get distinct values and sort them.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": -0.08085801682097074, "y": 0.02355761672230058}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_21", "text": "Handling NULLs:** - To filter out NULL values, use `JOIN` or add a `WHERE <column> IS NOT NULL` clause.", "kind": "prompt", "source": "data_science/sub_agents/bigquery/chase_sql/dc_prompt_template.py:17", "container": "DC_PROMPT_TEMPLATE", "x": 0.012213234003117438, "y": 0.00046998213885759456}, {"id": "prompt_data_science_sub_agents_bigquery_chase_sql_dc_prompt_template_py_L17_22", "text": "FROM/JOIN Clauses:** - Only include document.getElementById('coverage-pct').textContent = (DATA.summary.coverage * 100).toFixed(1) + '%';
document.getElementById('stat-surfaces').textContent = DATA.summary.surface_count;
document.getElementById('stat-evals').textContent = DATA.summary.eval_count;
document.getElementById('stat-regions').textContent = DATA.summary.region_count;
document.getElementById('stat-alpha').textContent = DATA.summary.alpha.toFixed(2);
document.getElementById('stat-bw').textContent = DATA.summary.bandwidth.toFixed(3);

const KIND_COLOR = {
  prompt: '#a78bfa',
  tool: '#f59e0b',
  tool_arg: '#fbbf24',
  docstring: '#94a3b8',
};
const KIND_LABEL = {
  prompt: 'prompt',
  tool: 'tool',
  tool_arg: 'tool arg',
  docstring: 'docstring',
};

function truncate(text, n) {
  if (text.length <= n) return text;
  return text.slice(0, n - 1) + '…';
}

function makeSurfaceTrace(kind) {
  const items = DATA.surfaces.filter(s => s.kind === kind);
  return {
    type: 'scattergl',
    mode: 'markers',
    name: KIND_LABEL[kind] || kind,
    x: items.map(s => s.x),
    y: items.map(s => s.y),
    text: items.map(s => `<b>${KIND_LABEL[kind] || kind}</b><br>${truncate(s.text, 120).replace(/</g,'&lt;')}<br><i>${s.source}</i>`),
    hoverinfo: 'text',
    marker: { color: KIND_COLOR[kind] || '#888', size: 9, opacity: 0.85, line: { width: 0 } },
  };
}

const surfaceTraces = Object.keys(KIND_COLOR)
  .filter(k => DATA.surfaces.some(s => s.kind === k))
  .map(makeSurfaceTrace);

const evalTrace = {
  type: 'scattergl',
  mode: 'markers',
  name: 'eval case',
  x: DATA.evals.map(e => e.x),
  y: DATA.evals.map(e => e.y),
  text: DATA.evals.map(e => `<b>eval</b><br>${truncate(e.text, 120).replace(/</g,'&lt;')}<br><i>${e.source}</i>`),
  hoverinfo: 'text',
  marker: { color: '#38bdf8', size: 13, opacity: 0.95, symbol: 'diamond', line: { width: 1, color: '#0b0e14' } },
};

const heatTrace = {
  type: 'heatmap',
  x: DATA.gap_field.x,
  y: DATA.gap_field.y,
  z: DATA.gap_field.z,
  colorscale: [[0, 'rgba(11,14,20,0)'], [0.4, 'rgba(239,68,68,0.0)'], [0.7, 'rgba(239,68,68,0.35)'], [1, 'rgba(239,68,68,0.65)']],
  showscale: false,
  hoverinfo: 'skip',
  zsmooth: 'best',
};

const regionShapes = DATA.regions.slice(0, 5).map(r => ({
  type: 'rect',
  x0: r.bbox[0], y0: r.bbox[1], x1: r.bbox[2], y1: r.bbox[3],
  line: { color: '#ef4444', width: 1.5, dash: 'dot' },
  fillcolor: 'rgba(239,68,68,0.08)',
  layer: 'above',
}));

const regionAnnotations = DATA.regions.slice(0, 5).map(r => ({
  x: r.centroid[0], y: r.centroid[1],
  text: r.id,
  showarrow: false,
  font: { color: '#fff', size: 13, family: 'ui-sans-serif' },
  bgcolor: '#ef4444',
  bordercolor: '#7f1d1d',
  borderwidth: 1,
  borderpad: 3,
  opacity: 0.95,
}));

Plotly.newPlot('map', [heatTrace, ...surfaceTraces, evalTrace], {
  paper_bgcolor: '#131820',
  plot_bgcolor: '#0b0e14',
  font: { color: '#d7dde8', family: 'ui-sans-serif' },
  margin: { l: 40, r: 16, t: 16, b: 36 },

const regionList = document.getElementById('region-list');
DATA.regions.forEach(region => {
  const wrap = document.createElement('div');
  wrap.className = 'region';
  const head = document.createElement('div');
  head.className = 'region-head';
  head.innerHTML = `<span class="region-id">${region.id}</span><span class="region-mass">mass ${region.mass.toFixed(3)}</span>`;
  wrap.appendChild(head);
  if (region.neighbors.length) {
    const ul = document.createElement('ul');
    ul.className = 'region-neighbors';
    region.neighbors.slice(0, 5).forEach(n => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="kind-${n.kind}">${KIND_LABEL[n.kind] || n.kind}</span> · ${truncate(n.text, 90).replace(/</g,'&lt;')}`;
      ul.appendChild(li);
    });
    wrap.appendChild(ul);
  }
  region.proposed.forEach(p => {
    const div = document.createElement('div');
    div.className = 'proposed';
    div.innerHTML = `<div class="label">proposed eval</div><pre>${(p.query || p.content || '').replace(/</g,'&lt;')}</pre>`;
    wrap.appendChild(div);
  });
  regionList.appendChild(wrap);
