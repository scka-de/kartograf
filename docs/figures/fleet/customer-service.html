<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kartograf — Semantic Coverage Map</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #131820;
    --border: #232a36;
    --text: #d7dde8;
    --muted: #7a8599;
    --surface: #f59e0b;
    --eval: #38bdf8;
    --gap: #ef4444;
    --accent: #a78bfa;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 24px; align-items: baseline; }
  h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  .subtitle { color: var(--muted); font-size: 13px; }
  .layout { display: grid; grid-template-columns: 1fr 380px; gap: 0; height: calc(100vh - 53px); }
  #map { background: var(--panel); }
  aside { background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 16px 18px; }
  .stat { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .stat .label { color: var(--muted); }
  .stat .value { font-variant-numeric: tabular-nums; }
  .coverage-big { font-size: 38px; font-weight: 700; letter-spacing: -0.02em; margin: 4px 0 12px; }
  .coverage-big .frac { color: var(--muted); font-size: 18px; font-weight: 400; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 18px 0 8px; font-weight: 600; }
  .region { border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
  .region-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .region-id { font-weight: 600; color: var(--gap); }
  .region-mass { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .region-neighbors { font-size: 12px; color: var(--text); }
  .region-neighbors li { margin: 2px 0; padding-left: 0; list-style: none; }
  .region-neighbors li::before { content: "·  "; color: var(--muted); }
  .kind-prompt { color: var(--accent); }
  .kind-tool, .kind-tool_arg { color: var(--surface); }
  .kind-docstring { color: #94a3b8; }
  .kind-eval { color: var(--eval); }
  .proposed { margin-top: 8px; padding: 8px 10px; background: #0f1722; border-radius: 4px; font-size: 12px; }
  .proposed .label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; margin-bottom: 4px; }
  .proposed pre { white-space: pre-wrap; margin: 0; font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.5; }
  footer { padding: 8px 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>Kartograf</h1>
  <span class="subtitle" id="target-name"></span>
</header>
<div class="layout">
  <div id="map"></div>
  <aside>
    <div class="coverage-big">
      <span id="coverage-pct">—</span><span class="frac"> coverage</span>
    </div>
    <div class="stat"><span class="label">surfaces</span><span class="value" id="stat-surfaces">—</span></div>
    <div class="stat"><span class="label">evals</span><span class="value" id="stat-evals">—</span></div>
    <div class="stat"><span class="label">gap regions</span><span class="value" id="stat-regions">—</span></div>
    <div class="stat"><span class="label">α (mass-balance)</span><span class="value" id="stat-alpha">—</span></div>
    <div class="stat"><span class="label">bandwidth</span><span class="value" id="stat-bw">—</span></div>
    <h2>Top gap regions</h2>
    <div id="region-list"></div>
  </aside>
</div>
<footer>
  Surface points are claims the agent declares (tools, prompts, docstrings).
  Eval points are tests in the suite.
  Red regions are surface-dense, eval-empty — what the agent claims but no test exercises.
</footer>

n recommendations and customer approval.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": 0.0240500995290736, "y": -0.18775428803729394}, {"id": "prompt_customer_service_prompts_py_L23_18", "text": "Confirm changes with the customer.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": 0.0010078545178937234, "y": -0.03959446076218341}, {"id": "prompt_customer_service_prompts_py_L23_19", "text": "*   Inform customers about relevant sales and promotions on recommended products.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": 0.03122558730974284, "y": -0.0827477116224389}, {"id": "prompt_customer_service_prompts_py_L23_20", "text": "Upselling and Service Promotion:** *   Suggest relevant services, such as professional planting services, when appropriate (e.g., after a plant purchase or when discussing gardening difficulties).", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": 0.21364378280070287, "y": -0.019495795692070217}, {"id": "prompt_customer_service_prompts_py_L23_21", "text": "*   Handle inquiries about pricing and discounts, including competitor offers.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": -0.0036965832184328133, "y": -0.0066152607550295}, {"id": "prompt_customer_service_prompts_py_L23_22", "text": "*   Request manager approval for discounts when necessary, according to company policy.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": -0.06760905559477562, "y": -0.019827736618902005}, {"id": "prompt_customer_service_prompts_py_L23_23", "text": "Explain the approval process to the customer.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": 0.026785926980309432, "y": 0.002140734264778986}, {"id": "prompt_customer_service_prompt 507}, {"id": "prompt_customer_service_prompts_py_L23_31", "text": "`send_call_companion_link: Sends a link for video connection.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": -0.02822786844934441, "y": 0.11502647184463577}, {"id": "prompt_customer_service_prompts_py_L23_32", "text": "Use this tool to start live streaming with the user.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": 0.009409074146177112, "y": 0.07111892303651504}, {"id": "prompt_customer_service_prompts_py_L23_33", "text": "When user agrees with you to share video, use this tool to start the process *   `approve_discount: Approves a discount (within pre-defined limits).", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": -0.10755904704001183, "y": 0.0914402968909128}, {"id": "prompt_customer_service_prompts_py_L23_34", "text": "*   `sync_ask_for_approval: Requests discount approval from a manager (synchronous version).", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": -0.1372813349664095, "y": 0.028737279464165058}, {"id": "prompt_customer_service_prompts_py_L23_35", "text": "*   `update_salesforce_crm: Updates customer records in Salesforce after the customer has completed a purchase.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": -0.06496957671907706, "y": -0.11148117700549215}, {"id": "prompt_customer_service_prompts_py_L23_36", "text": "*   `access_cart_information: Retrieves the customer's cart contents.", "kind": "prompt", "source": "customer_service/prompts.py:23", "container": "INSTRUCTION", "x": -0.04467166203895089, "y": -0.20824558342896674}, {"id": "prompt_customer_service_prompts_py_L23_37", "text": "Use this to check customers cart contents or as a check before related operations *   `modify_cart: Updates the customer's cart. before modifying a car function truncate(text, n) {
  if (text.length <= n) return text;
  return text.slice(0, n - 1) + '…';
}

function makeSurfaceTrace(kind) {
  const items = DATA.surfaces.filter(s => s.kind === kind);
  return {
    type: 'scattergl',
    mode: 'markers',
    name: KIND_LABEL[kind] || kind,
    x: items.map(s => s.x),
    y: items.map(s => s.y),
    text: items.map(s => `<b>${KIND_LABEL[kind] || kind}</b><br>${truncate(s.text, 120).replace(/</g,'&lt;')}<br><i>${s.source}</i>`),
    hoverinfo: 'text',
    marker: { color: KIND_COLOR[kind] || '#888', size: 9, opacity: 0.85, line: { width: 0 } },
  };
}
