<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title>The Coverage Stack</title>
<desc>Four-layer agent quality stack. Layer 1 semantic coverage is the foundation and ships in this submission. Layers 2 to 4 are roadmap.</desc>
<style>
.t { font-size:14px; fill:#3d3d3a; }
.ts { font-size:12px; fill:#73726c; }
.th { font-size:14px; font-weight:500; fill:#3d3d3a; }
</style>

<text class="ts" x="40" y="30" fill="#73726c">The Coverage Stack</text>

<rect x="40" y="50" width="600" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="60" y="72" fill="#444441">L4 — Policy and release gates</text>
<text class="ts" x="60" y="92" fill="#5F5E5A">Block deploys when coverage drops below threshold</text>
<text class="ts" x="620" y="82" text-anchor="end" fill="#5F5E5A">Roadmap</text>

<rect x="40" y="116" width="600" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="60" y="138" fill="#444441">L3 — Trajectory coverage</text>
<text class="ts" x="60" y="158" fill="#5F5E5A">Compare tool-use sequences against production trajectories</text>
<text class="ts" x="620" y="148" text-anchor="end" fill="#5F5E5A">Roadmap</text>

<rect x="40" y="182" width="600" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="60" y="204" fill="#444441">L2 — Behavioral coverage</text>
<text class="ts" x="60" y="224" fill="#5F5E5A">Judge agent reasoning quality inside each region</text>
<text class="ts" x="620" y="214" text-anchor="end" fill="#5F5E5A">Roadmap</text>

<rect x="40" y="248" width="600" height="76" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="60" y="276" fill="#3C3489">L1 — Semantic coverage</text>
<text class="ts" x="60" y="296" fill="#534AB7">Map the world the agent faces, find gaps in the eval suite</text>
<text class="ts" x="60" y="312" fill="#534AB7">This is Cartograph</text>
<text class="th" x="620" y="296" text-anchor="end" fill="#3C3489">v1 — ships now</text>

<text class="ts" x="40" y="358" fill="#73726c">Each layer depends on the one below it.</text>
<text class="ts" x="40" y="378" fill="#73726c">Without a faithful map of reality, every higher layer evaluates the agent against a biased sample.</text>
<text class="ts" x="40" y="398" fill="#73726c">L1 is the foundation that makes the rest of the stack auditable.</text>
</svg>
